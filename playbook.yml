---
- name: Setup all servers
  hosts: all
  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install common packages
      apt:
        name:
          - curl
          - wget
          - vim
          - htop
        state: present

    - name: Create deploy user
      user:
        name: deploy
        shell: /bin/bash
        create_home: yes
