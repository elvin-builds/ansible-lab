---
- name: Install NGINX
  apt:
    name: nginx
    state: present
    update_cache: yes

- name: Copy NGINX config
  template:
    src: nginx.conf.j2
    dest: /etc/nginx/sites-available/default
  notify: Restart NGINX

- name: Ensure NGINX is running
  service:
    name: nginx
    state: started
    enabled: yes
